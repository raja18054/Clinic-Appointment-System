
<!DOCTYPE html>
<html>
<head>
<title>Add Patient</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

<div class="card p-4">

<h3>Add Patient</h3>

<form method="POST">

<input class="form-control mb-3" name="name" placeholder="Patient Name" required>

<input class="form-control mb-3" name="age" placeholder="Age" required>

<input class="form-control mb-3" name="phone" placeholder="Phone" required>

<button class="btn btn-primary">Save</button>

<a href="/" class="btn btn-secondary">Back</a>

</form>

</div>

</div>

</body>
</html>
